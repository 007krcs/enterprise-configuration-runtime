<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rules logic illustration">
  <rect width="280" height="200" rx="20" fill="#020617" />
  <rect x="40" y="40" width="200" height="40" rx="10" fill="#0f172a" stroke="#0ea5e9" stroke-width="3" />
  <rect x="40" y="100" width="200" height="40" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="3" />
  <circle cx="70" cy="60" r="6" fill="#fff" />
  <circle cx="70" cy="120" r="6" fill="#fff" />
  <path d="M130 80 L150 80 L170 110" stroke="#fff" stroke-width="3" fill="none" marker-end="url(#dot)" />
  <defs>
    <marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="6" markerHeight="6">
      <circle cx="3" cy="3" r="3" fill="#fff" />
    </marker>
  </defs>
  <text x="150" y="30" fill="#fff" font-size="16" font-weight="700">
    Rule: cart.total > 0
  </text>
  <text x="150" y="135" fill="#a5b4fc" font-size="11" text-anchor="middle">
    Actions: setContext, emitEvent
  </text>
</svg>
